<div class="home-container">
  <h1>{{ portalName }}</h1>
  
  <p class="subtitle">
    Manage your courses, profile and enrollments easily.
  </p>

  <div class="enrollment-section">
    <button [disabled]="!isPortalActive" (click)="onEnrollClick()" class="btn btn-primary">Enroll Now</button>
    <p class="message" *ngIf="message">{{ message }}</p>
  </div>

  <div class="search-section">
    <div class="search-box">
      <label for="course-search">Quick Search: </label>
      <input id="course-search" [(ngModel)]="searchTerm" placeholder="Search for courses..." class="search-input">
    </div>
    <p class="search-feedback">Searching for: {{ searchTerm }}</p>
  </div>

  <div class="stats">
    <div class="card">
      <h2>{{ (courseService.getCourses() | async)?.length }}</h2>
      <p>Courses Available</p>
    </div>

    <div class="card">
      <h2>{{ enrollmentService.getEnrolledCourses().length }}</h2>
      <p>Enrolled</p>
    </div>

    <div class="card">
      <h2>3.8</h2>
      <p>GPA</p>
    </div>
  </div>

  <app-course-summary></app-course-summary>
</div>
